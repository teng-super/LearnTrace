server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: learntrace
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/learntrace?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_USER:learntrace}
    password: ${MYSQL_PASSWORD:learntrace123}
  servlet:
    multipart:
      max-file-size: 80MB
      max-request-size: 100MB
  jackson:
    time-zone: Asia/Shanghai
  sql:
    init:
      mode: always
      continue-on-error: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

learntrace:
  jwt:
    secret: ${JWT_SECRET:learntrace-demo-secret-change-this-please-2026}
    expires-hours: ${JWT_EXPIRES_HOURS:168}
  storage:
    uploads-dir: ${UPLOADS_DIR:D:/LearnTrace/data/uploads}
    exports-dir: ${EXPORTS_DIR:D:/LearnTrace/data/exports}
    public-base-url: ${PUBLIC_BASE_URL:http://localhost:8080/api/files/public}
  onlyoffice:
    document-server-url: ${ONLYOFFICE_URL:http://localhost:8088}
