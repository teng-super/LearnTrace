services:
  mysql:
    image: mysql:8.4
    container_name: learntrace-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: learntrace
      MYSQL_USER: learntrace
      MYSQL_PASSWORD: learntrace123
      MYSQL_ROOT_PASSWORD: root123456
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci

  onlyoffice:
    image: onlyoffice/documentserver:8.2
    container_name: learntrace-onlyoffice
    restart: unless-stopped
    ports:
      - "8088:80"

  backend:
    build: ./backend
    container_name: learntrace-backend
    restart: unless-stopped
    depends_on:
      - mysql
      - onlyoffice
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/learntrace?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      MYSQL_USER: learntrace
      MYSQL_PASSWORD: learntrace123
      JWT_SECRET: learntrace-demo-secret-change-this-please-2026
      UPLOADS_DIR: /app/data/uploads
      EXPORTS_DIR: /app/data/exports
      PUBLIC_BASE_URL: http://localhost:8080/api/files/public
      ONLYOFFICE_URL: http://localhost:8088
    ports:
      - "8080:8080"
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/exports:/app/data/exports

  frontend:
    build: ./frontend
    container_name: learntrace-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
